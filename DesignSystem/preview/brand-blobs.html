<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; }
  .demo { width: 700px; height: 150px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .blob { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; }
  .text { position: relative; z-index: 1; font-size: 32px; font-weight: 900; color: #3D2B1F; text-align: center; }
  .sub { font-size: 14px; font-weight: 600; color: #6B4F42; margin-top: 4px; }
</style>
</head>
<body>
<div class="demo">
  <div class="blob" style="width:300px;height:300px;background:#FF6B4A;opacity:.13;top:-100px;left:-80px"></div>
  <div class="blob" style="width:250px;height:250px;background:#FFD340;opacity:.15;bottom:-80px;right:-60px"></div>
  <div class="blob" style="width:200px;height:200px;background:#4EC9C0;opacity:.13;top:20px;right:120px"></div>
  <div class="text">
    Moda Infantil Masculina
    <div class="sub">Blobs decorativos — blur 70px, opacidade 13–15%</div>
  </div>
</div>
</body></html>
