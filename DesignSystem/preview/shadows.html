<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 24px 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
  .shadow-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; border-radius: 16px; background: #fff; }
  .name { font-size: 10px; font-weight: 800; color: #9A7B70; text-align: center; }
  .val { font-size: 9px; font-weight: 600; color: #A08078; text-align: center; max-width: 80px; }
</style>
</head>
<body>
<div class="row">
  <div class="shadow-item">
    <div class="box" style="box-shadow:0 2px 16px rgba(61,43,31,0.10)"></div>
    <div class="name">Card</div><div class="val">0 2 16 brown/10%</div>
  </div>
  <div class="shadow-item">
    <div class="box" style="box-shadow:0 6px 28px rgba(0,0,0,0.13)"></div>
    <div class="name">Logo</div><div class="val">0 6 28 black/13%</div>
  </div>
  <div class="shadow-item">
    <div class="box" style="box-shadow:0 4px 18px rgba(255,107,74,0.30);background:#FF6B4A"></div>
    <div class="name">Coral CTA</div><div class="val">0 4 18 coral/30%</div>
  </div>
  <div class="shadow-item">
    <div class="box" style="box-shadow:0 4px 18px rgba(78,201,192,0.35);background:#4EC9C0"></div>
    <div class="name">Teal CTA</div><div class="val">0 4 18 teal/35%</div>
  </div>
</div>
</body></html>
