<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid #EDE0DC; }
  .meta { font-size: 10px; font-weight: 700; color: #9A7B70; min-width: 90px; }
  .sample { color: #3D2B1F; }
</style>
</head>
<body>
  <div class="row"><span class="meta">64px / Black</span><span class="sample" style="font-size:64px;font-weight:900;line-height:1">PlayBe</span></div>
  <div class="row"><span class="meta">48px / Black</span><span class="sample" style="font-size:48px;font-weight:900;line-height:1">Coleção Kids</span></div>
  <div class="row"><span class="meta">36px / ExtraBold</span><span class="sample" style="font-size:36px;font-weight:800">Moda Infantil</span></div>
  <div class="row"><span class="meta">28px / Bold</span><span class="sample" style="font-size:28px;font-weight:700">Atacado & Varejo</span></div>
  <div class="row"><span class="meta">22px / SemiBold</span><span class="sample" style="font-size:22px;font-weight:600">Roupas para meninos</span></div>
  <div class="row"><span class="meta">16px / SemiBold</span><span class="sample" style="font-size:16px;font-weight:600">Qualidade e estilo para os pequenos</span></div>
  <div class="row"><span class="meta">14px / SemiBold</span><span class="sample" style="font-size:14px;font-weight:600">Frete grátis acima de R$150</span></div>
  <div class="row"><span class="meta">12px / Bold · CAPS</span><span class="sample" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em">Categoria · Tamanho · Cor</span></div>
</body></html>
