<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px 24px; }
  .row { display: flex; align-items: center; gap: 16px; padding: 7px 0; border-bottom: 1px solid #EDE0DC; }
  .meta { font-size: 10px; font-weight: 700; color: #9A7B70; min-width: 90px; }
  .sample { font-size: 22px; color: #3D2B1F; }
</style>
</head>
<body>
  <div class="row"><span class="meta">400 Regular</span><span class="sample" style="font-weight:400">Playbekids — Moda Infantil</span></div>
  <div class="row"><span class="meta">600 SemiBold</span><span class="sample" style="font-weight:600">Playbekids — Moda Infantil</span></div>
  <div class="row"><span class="meta">700 Bold</span><span class="sample" style="font-weight:700">Playbekids — Moda Infantil</span></div>
  <div class="row"><span class="meta">800 ExtraBold</span><span class="sample" style="font-weight:800">Playbekids — Moda Infantil</span></div>
  <div class="row"><span class="meta">900 Black</span><span class="sample" style="font-weight:900">Playbekids — Moda Infantil</span></div>
</body></html>
