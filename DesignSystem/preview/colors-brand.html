<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { border-radius: 12px; overflow: hidden; width: 100px; flex-shrink: 0; }
  .color { height: 64px; }
  .info { padding: 6px 8px; background: #fff; }
  .name { font-size: 11px; font-weight: 800; color: #3D2B1F; }
  .hex  { font-size: 10px; font-weight: 700; color: #9A7B70; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#FF6B4A"></div><div class="info"><div class="name">Coral</div><div class="hex">#FF6B4A</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFAA91"></div><div class="info"><div class="name">Coral Light</div><div class="hex">#FFAA91</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFE6DF"></div><div class="info"><div class="name">Coral Pale</div><div class="hex">#FFE6DF</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFD340"></div><div class="info"><div class="name">Yellow</div><div class="hex">#FFD340</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFE98A"></div><div class="info"><div class="name">Yellow Light</div><div class="hex">#FFE98A</div></div></div>
  <div class="swatch"><div class="color" style="background:#4EC9C0"></div><div class="info"><div class="name">Teal</div><div class="hex">#4EC9C0</div></div></div>
  <div class="swatch"><div class="color" style="background:#A8E8E4"></div><div class="info"><div class="name">Teal Light</div><div class="hex">#A8E8E4</div></div></div>
  <div class="swatch"><div class="color" style="background:#3D7EBF"></div><div class="info"><div class="name">Blue</div><div class="hex">#3D7EBF</div></div></div>
  <div class="swatch"><div class="color" style="background:#A8CCEE"></div><div class="info"><div class="name">Blue Light</div><div class="hex">#A8CCEE</div></div></div>
</div>
</body></html>
