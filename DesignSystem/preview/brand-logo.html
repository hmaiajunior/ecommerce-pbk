<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 24px; display: flex; gap: 32px; align-items: center; }
  .logo-circle { width: 100px; height: 100px; border-radius: 50%; background: #f5ede8; overflow: hidden; box-shadow: 0 6px 28px rgba(0,0,0,0.13); flex-shrink: 0; }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 38%; }
  .logo-sm { width: 60px; height: 60px; }
  .logo-xs { width: 40px; height: 40px; }
  .info { }
  .brand { font-size: 28px; font-weight: 900; color: #3D2B1F; }
  .sub { font-size: 13px; font-weight: 600; color: #9A7B70; margin-top: 2px; }
  .sizes { display: flex; gap: 16px; margin-top: 16px; align-items: center; }
</style>
</head>
<body>
  <div class="logo-circle"><img src="../assets/logo.jpeg" alt="Playbekids"></div>
  <div class="info">
    <div class="brand">Playbekids</div>
    <div class="sub">Moda Infantil Masculina · Atacado & Varejo</div>
    <div class="sizes">
      <div class="logo-circle logo-sm"><img src="../assets/logo.jpeg" alt="Playbekids"></div>
      <div class="logo-circle logo-xs"><img src="../assets/logo.jpeg" alt="Playbekids"></div>
    </div>
  </div>
</body></html>
