<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { border-radius: 12px; overflow: hidden; width: 100px; flex-shrink: 0; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .color { height: 64px; }
  .info { padding: 6px 8px; background: #fff; }
  .name { font-size: 11px; font-weight: 800; color: #3D2B1F; }
  .hex  { font-size: 10px; font-weight: 700; color: #9A7B70; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#3D2B1F"></div><div class="info"><div class="name">Brown Dark</div><div class="hex">#3D2B1F</div></div></div>
  <div class="swatch"><div class="color" style="background:#6B4F42"></div><div class="info"><div class="name">Brown Mid</div><div class="hex">#6B4F42</div></div></div>
  <div class="swatch"><div class="color" style="background:#9A7B70"></div><div class="info"><div class="name">Brown Muted</div><div class="hex">#9A7B70</div></div></div>
  <div class="swatch"><div class="color" style="background:#A08078"></div><div class="info"><div class="name">Brown Light</div><div class="hex">#A08078</div></div></div>
  <div class="swatch"><div class="color" style="background:#EDE0DC"></div><div class="info"><div class="name">Nude</div><div class="hex">#EDE0DC</div></div></div>
  <div class="swatch"><div class="color" style="background:#f5ede8"></div><div class="info"><div class="name">Blush</div><div class="hex">#f5ede8</div></div></div>
  <div class="swatch"><div class="color" style="background:#fff9f0"></div><div class="info"><div class="name">Cream</div><div class="hex">#fff9f0</div></div></div>
</div>
</body></html>
