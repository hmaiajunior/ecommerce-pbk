<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 800; }
  .section { margin-bottom: 14px; }
  .label { font-size: 10px; font-weight: 800; color: #9A7B70; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="section"><div class="label">Actions</div><div class="row">
  <div class="chip" style="background:#FF6B4A;color:#fff">Primary</div>
  <div class="chip" style="background:#E05A38;color:#fff">Primary Hover</div>
  <div class="chip" style="background:#4EC9C0;color:#fff">Secondary</div>
  <div class="chip" style="background:#FFD340;color:#3D2B1F">Accent</div>
</div></div>
<div class="section"><div class="label">Text</div><div class="row">
  <div class="chip" style="background:#3D2B1F;color:#fff">Heading</div>
  <div class="chip" style="background:#6B4F42;color:#fff">Body</div>
  <div class="chip" style="background:#9A7B70;color:#fff">Muted</div>
  <div class="chip" style="background:#3D7EBF;color:#fff">Link</div>
</div></div>
<div class="section"><div class="label">Backgrounds</div><div class="row">
  <div class="chip" style="background:#fff9f0;color:#3D2B1F;border:1px solid #EDE0DC">Page Cream</div>
  <div class="chip" style="background:#f5ede8;color:#3D2B1F;border:1px solid #EDE0DC">Card Blush</div>
  <div class="chip" style="background:#EDE0DC;color:#6B4F42">Inactive</div>
</div></div>
</body></html>
