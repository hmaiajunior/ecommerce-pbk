<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #fff9f0; padding: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .label { font-size: 10px; font-weight: 800; color: #9A7B70; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .chip { padding: 8px 20px; border-radius: 100px; font-weight: 900; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
  .tag { padding: 5px 14px; border-radius: 100px; font-weight: 800; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: .05em; }
</style>
</head>
<body>
  <div class="label">Chips</div>
  <div class="row">
    <span class="chip" style="background:#FF6B4A;color:#fff">Novo</span>
    <span class="chip" style="background:#4EC9C0;color:#fff;box-shadow:0 4px 18px rgba(78,201,192,.35)">Disponível</span>
    <span class="chip" style="background:#FFD340;color:#3D2B1F">Promoção</span>
    <span class="chip" style="background:#EDE0DC;color:#A08078;text-decoration:line-through">Esgotado</span>
    <span class="chip" style="background:#3D7EBF;color:#fff">Atacado</span>
  </div>
  <div class="label">Tags / Labels</div>
  <div class="row">
    <span class="tag" style="background:#fff9f0;color:#9A7B70;border:1.5px solid #EDE0DC">Tamanho 2</span>
    <span class="tag" style="background:#fff9f0;color:#9A7B70;border:1.5px solid #EDE0DC">Tamanho 4</span>
    <span class="tag" style="background:#fff9f0;color:#9A7B70;border:1.5px solid #EDE0DC">Tamanho 6</span>
    <span class="tag" style="background:#FF6B4A;color:#fff">⚠️ Aviso</span>
    <span class="tag" style="background:#f5ede8;color:#6B4F42">Masculino</span>
  </div>
</body></html>
