<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #fff9f0;
    overflow: hidden;
  }

  /* Background blobs */
  .blob { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
  .b1 { width: 500px; height: 500px; background: #FF6B4A; opacity:.13; top:-150px; left:-150px; }
  .b2 { width: 450px; height: 450px; background: #FFD340; opacity:.15; bottom:-120px; right:-120px; }
  .b3 { width: 300px; height: 300px; background: #4EC9C0; opacity:.13; top:350px; right:-60px; }

  /* Decorative dots */
  .dot { position: absolute; border-radius: 50%; pointer-events: none; }

  /* Main layout using absolute positioning for reliability */
  .logo-wrap {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: #f5ede8;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(0,0,0,0.13);
  }
  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 50% 38%;
  }

  .tag {
    position: absolute;
    top: 262px;
    left: 50%;
    transform: translateX(-50%);
    background: #FF6B4A;
    color: #fff;

    border-radius: 100px;

    font-weight: 600;
    color: #6B4F42;
    line-height: 1.55;
    padding: 0 100px;
  }

  .accounts {
